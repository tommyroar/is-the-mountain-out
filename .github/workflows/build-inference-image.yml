name: build-inference-image

on:
  push:
    branches: [main]
    paths:
      - 'inference/**'
      - 'tools/predict_state.py'
      - 'train/**'
      - 'collect/storage.py'
      - 'mountain.toml'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.dockerignore'
      - '.github/workflows/build-inference-image.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: build-inference-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/inference
          tags: |
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: inference/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            MODEL_VERSION=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
