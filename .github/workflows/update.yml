name: update

on:
  schedule:
    - cron: '*/15 * * * *'
  push:
    branches: [main]
    paths:
      - 'web/**'
      - 'tools/predict_state.py'
      - 'train/checkpoints/**'
      - 'train/model.py'
      - 'train/utils.py'
      - 'train/config_loader.py'
      - 'mountain.toml'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/update.yml'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install Python dependencies
        run: uv sync --frozen --no-dev

      - name: Run inference
        run: uv run python tools/predict_state.py --out web/public/state.json

      - name: Commit updated state.json
        run: |
          if git diff --quiet web/public/state.json; then
            echo "state.json unchanged"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add web/public/state.json
            git commit -m "chore: update mountain state $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        run: npm install --no-audit --no-fund
        working-directory: web

      - name: Build SPA
        run: npm run build
        working-directory: web

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

      - id: deploy
        uses: actions/deploy-pages@v4
