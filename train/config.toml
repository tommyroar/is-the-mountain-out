webcam_sources = [
    0, # Local camera index
    "https://example.com/stream" # Stream URL
]

metar_station = "KSEA" # Seattle-Tacoma International Airport

schedule_seconds = 1800 # 30 minutes for launchctl service
capture_interval_seconds = 300 # 5 minutes between captures in 'live' loop
gradient_accumulation_steps = 4 # Train after 4 captures
checkpoint_dir = "checkpoints"

[lora_settings]
rank = 8
alpha = 16
target_modules = ["fc1", "fc2"] # ConvNeXt Linear layers in MLP
