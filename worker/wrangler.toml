name = "mountain-inference"
main = "src/index.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

[triggers]
crons = ["*/15 * * * *"]

# Container binding. Cloudflare Containers can only pull from its own managed
# registry (not GHCR), so the image is pushed to registry.cloudflare.com:
#   docker pull ghcr.io/tommyroar/is-the-mountain-out/inference:latest
#   docker tag  ... mountain-inference:latest
#   wrangler containers push mountain-inference:latest
# See .github/workflows/build-inference-image.yml for the upstream GHCR build.
[[containers]]
class_name = "InferenceContainer"
image = "registry.cloudflare.com/d7adee58513c1b2f770ccaac90cf114f/mountain-inference:745dfb1"
max_instances = 1
instance_type = "standard-1"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["InferenceContainer"]

[durable_objects]
bindings = [
  { class_name = "InferenceContainer", name = "INFERENCE_CONTAINER" }
]

# Public bucket the SPA reads from. Worker writes state.json + history.jsonl.
[[r2_buckets]]
binding = "STATE_BUCKET"
bucket_name = "is-the-mountain-out-public"
