name = "mountain-capture-worker"
main = "workers/capture/index.ts"
compatibility_date = "2026-03-15"

[[r2_buckets]]
binding = "MOUNTAIN_CAPTURES"
bucket_name = "is-the-mountain-out-captures"

[[kv_namespaces]]
binding = "MOUNTAIN_STATE"
id = "mountain_state_kv"

[vars]
WEBCAM_URL = "https://atmos.uw.edu/data/images/webcam2_latest.jpg"
METAR_STATION = "KSEA"

[triggers]
crons = ["*/10 * * * *"]
